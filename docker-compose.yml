services:
  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    restart: unless-stopped

  client:
    build:
      context: ./apps/client
      args:
        VITE_API_URL: /api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped
